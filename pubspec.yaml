name: minove
description: "A new Flutter project."
publish_to: "none"
version: 1.0.2+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  waterfall_flow: 3.1.1
  shared_preferences: 2.5.3
  flutter_inappwebview: ^6.1.5
  video_player: ^2.10.1
  in_app_purchase: 3.2.1
  image_picker: ^1.2.1
  bot_toast: ^4.1.3
  intl: ^0.20.1
  permission_handler: ^12.0.1
  audioplayers: ^6.6.0
  record: ^6.2.0
  path_provider: ^2.1.5
  loading_indicator: ^3.1.1
  video_thumbnail: ^0.5.6
  flutter_launcher_icons: 0.14.4
  flutter_native_splash: ^2.4.4
  encrypt: ^5.0.3
  flutter_secure_storage: ^10.3.1
  device_info_plus: ^13.1.0
  dio: ^5.9.2
  vpn_detector: ^1.3.1
  devicelocale: ^0.9.0
  url_launcher: ^6.3.2
  flutter_native_timezone: ^2.0.0
  system_keyboard_languages: ^0.0.2
  geolocator: ^14.0.3
  geocoding: ^4.0.0
  adjust_sdk: ^5.6.2
  facebook_app_events: ^0.30.0
  flutter_local_notifications: ^22.0.1
  screen_protector: ^1.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter_launcher_icons:
  android: truedevicelocale
  ios: true
  remove_alpha_ios: true
  web:
    generate: true
  image_path: "assets/images/minovelogo.png"

flutter_native_splash:
  background_image: "assets/images/klchaqu_start.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/

  fonts:
    - family: FredokaOne
      fonts:
        - asset: assets/fonts/FredokaOne-Regular.ttf
    - family: PatrickHand
      fonts:
        - asset: assets/fonts/PatrickHand-Regular.ttf
