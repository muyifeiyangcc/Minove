name: minove
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  waterfall_flow: 3.1.1
  shared_preferences: 2.5.3
  flutter_inappwebview: ^6.1.5
  video_player: ^2.10.1
  in_app_purchase: 3.2.1
  image_picker: ^1.2.1
  bot_toast: ^4.1.3
  intl: ^0.20.1
  permission_handler: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/

  fonts:
    - family: FredokaOne
      fonts:
        - asset: assets/fonts/FredokaOne-Regular.ttf
    - family: PatrickHand
      fonts:
        - asset: assets/fonts/PatrickHand-Regular.ttf
